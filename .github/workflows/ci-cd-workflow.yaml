name: CI-CD-AKS

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:

  build_scan_push:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.tag.outputs.sha }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Generate Image Tag (Commit SHA)
      - name: Set Image Tag
        id: tag
        run: echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      # DockerHub Login
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Install Trivy via shell (no action version dependency)
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy --version

      # Filesystem Scan
      - name: Trivy Filesystem Scan
        run: trivy fs --exit-code 0 --severity HIGH,CRITICAL .

      # Backend Build
      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_REPO_BACKEND }}:${{ steps.tag.outputs.sha }} ./backend

      # Backend Image Scan
      - name: Scan Backend Image
        run: |
          trivy image --exit-code 0 --severity HIGH,CRITICAL ${{ secrets.DOCKER_REPO_BACKEND }}:${{ steps.tag.outputs.sha }}

      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKER_REPO_BACKEND }}:${{ steps.tag.outputs.sha }}

      # Frontend Build
      - name: Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_REPO_FRONTEND }}:${{ steps.tag.outputs.sha }} ./frontend

      # Frontend Image Scan
      - name: Scan Frontend Image
        run: |
          trivy image --exit-code 0 --severity HIGH,CRITICAL ${{ secrets.DOCKER_REPO_FRONTEND }}:${{ steps.tag.outputs.sha }}

      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKER_REPO_FRONTEND }}:${{ steps.tag.outputs.sha }}



  deploy:
    runs-on: ubuntu-latest
    needs: build_scan_push

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Azure Login using Service Principal JSON
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Get AKS Credentials
      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      # Install Helm
      - name: Install Helm
        uses: azure/setup-helm@v4

      # Helm Lint (Prevents YAML mistakes)
      - name: Helm Lint
        run: helm lint ./helm/crud-app-chart

      # Deploy using Helm
      - name: Helm Deploy to AKS
        run: |
          helm upgrade --install crud-app ./helm/crud-app-chart \
            --namespace crud-app \
            --create-namespace \
            --wait \
            --timeout 5m \
            --set backend.image.repository=${{ secrets.DOCKER_REPO_BACKEND }} \
            --set backend.image.tag=${{ needs.build_scan_push.outputs.image_tag }} \
            --set frontend.image.repository=${{ secrets.DOCKER_REPO_FRONTEND }} \
            --set frontend.image.tag=${{ needs.build_scan_push.outputs.image_tag }}
